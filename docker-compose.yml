services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: sociala_db
      MYSQL_USER: sociala_user
      MYSQL_PASSWORD: sociala_password
      MYSQL_ROOT_PASSWORD: root_password
    ports:
      - "9007:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: .
    environment:
      DEBUG: "1"
      SECRET_KEY: "change-me-in-production"
      DB_ENGINE: "mysql"
      DB_NAME: "sociala_db"
      DB_USER: "sociala_user"
      DB_PASSWORD: "sociala_password"
      DB_HOST: "db"
      DB_PORT: "3306"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9006:8001"
    volumes:
      - .:/app
    command: >
      sh -c "until mysqladmin ping --ssl=0 -h\"$$DB_HOST\" -u\"$$DB_USER\" -p\"$$DB_PASSWORD\" --silent; do echo 'waiting for db'; sleep 2; done; python manage.py migrate && daphne -b 0.0.0.0 -p 8001 config.asgi:application"

  frontend:
    build: ./nextjs-frontend
    environment:
      NEXT_PUBLIC_API_URL: "https://203.190.12.139:9008/api"
      NEXT_PUBLIC_WS_BASE: "wss://203.190.12.139:9008/ws"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    volumes:
      - ./nextjs-frontend:/app
      - /app/node_modules

  proxy:
    image: nginx:alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "9008:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro

volumes:
  mysql_data:
